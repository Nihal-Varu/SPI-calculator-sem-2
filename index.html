<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDU SPI Predictor</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 18px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
}

.input-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 12px;
    margin-bottom: 4px;
    color: #94a3b8;
}

input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    text-align: center;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

td, th {
    padding: 10px;
    text-align: center;
}

th {
    color: #94a3b8;
}

tr {
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.result {
    text-align: center;
    font-size: 24px;
    margin-top: 15px;
    font-weight: bold;
}

.fail {
    color: #ef4444;
    font-weight: bold;
}

.pass {
    color: #22c55e;
}
</style>
</head>

<body>

<h1>DDU Sem 2 SPI Predictor (Expected Marks)</h1>

<div class="container">

<!-- Maths -->
<div class="card">
<h3>Maths-II</h3>
<div class="grid">
<div class="input-group">
<label>Expected Sessional Avg ( / 36)</label>
<input id="m_sess">
</div>
<div class="input-group">
<label>Expected Attendance ( / 4)</label>
<input id="m_att">
</div>
<div class="input-group">
<label>Expected External ( / 60)</label>
<input id="m_ext">
</div>
</div>
</div>

<!-- PSC++ -->
<div class="card">
<h3>PSC++</h3>
<div class="grid">
<div class="input-group">
<label>Expected Sessional Avg ( / 36)</label>
<input id="p_sess">
</div>
<div class="input-group">
<label>Expected Attendance ( / 4)</label>
<input id="p_att">
</div>
<div class="input-group">
<label>Expected TW ( / 50)</label>
<input id="p_tw">
</div>
<div class="input-group">
<label>Expected External ( / 60)</label>
<input id="p_ext">
</div>
</div>
</div>

<!-- Physics -->
<div class="card">
<h3>Physics</h3>
<div class="grid">
<div class="input-group">
<label>Expected Sessional Avg ( / 36)</label>
<input id="ph_sess">
</div>
<div class="input-group">
<label>Expected Attendance ( / 4)</label>
<input id="ph_att">
</div>
<div class="input-group">
<label>Expected TW ( / 50)</label>
<input id="ph_tw">
</div>
<div class="input-group">
<label>Expected External ( / 60)</label>
<input id="ph_ext">
</div>
</div>
</div>

<!-- HW -->
<div class="card">
<h3>Hardware Workshop</h3>
<div class="input-group">
<label>Expected TW ( / 100)</label>
<input id="hw_tw">
</div>
</div>

<!-- English -->
<div class="card">
<h3>English</h3>
<div class="grid">
<div class="input-group">
<label>Expected TW ( / 50)</label>
<input id="e_tw">
</div>
<div class="input-group">
<label>Expected External ( / 40)</label>
<input id="e_ext">
</div>
</div>
</div>

<!-- EVS -->
<div class="card">
<h3>EVS (0 Credit)</h3>
<div class="input-group">
<label>Expected External ( / 40)</label>
<input id="evs_ext">
</div>
</div>

<button onclick="calculateSPI()">Calculate SPI</button>

<div id="output"></div>

</div>

<script>

function getGP(p){
    if(p>=85) return 10;
    if(p>=75) return 9;
    if(p>=65) return 8;
    if(p>=55) return 7;
    if(p>=45) return 6;
    if(p>=40) return 5;
    return 0;
}

function getGrade(gp){
    return ["FF","CD","CC","BC","BB","AB","AA"][gp];
}

function calc(name, marks, max, credit){
    let p = (marks/max)*100;
    let gp = getGP(p);

    return {
        name,
        percent: p.toFixed(1),
        gp,
        grade: getGrade(gp),
        status: p<40 ? "<span class='fail'>FAIL</span>" : "<span class='pass'>PASS</span>",
        score: gp*credit,
        credit
    };
}

function calculateSPI(){

let s = [];

s.push(calc("Maths",
(+m_sess.value||0)+(+m_att.value||0)+(+m_ext.value||0),
100,4));

s.push(calc("PSC++",
(+p_sess.value||0)+(+p_att.value||0)+(+p_tw.value||0)+(+p_ext.value||0),
150,5.5));

s.push(calc("Physics",
(+ph_sess.value||0)+(+ph_att.value||0)+(+ph_tw.value||0)+(+ph_ext.value||0),
150,5));

s.push(calc("HW",
(+hw_tw.value||0),
100,2));

s.push(calc("English",
(+e_tw.value||0)+(+e_ext.value||0),
90,4));

// EVS (0 credit)
s.push(calc("EVS",
(+evs_ext.value||0),
40,0));

let total=0, credits=0;

let html="<table><tr><th>Subject</th><th>%</th><th>Grade</th><th>GP</th><th>Status</th></tr>";

s.forEach(x=>{
    total+=x.score;
    credits+=x.credit;
    html+=`<tr>
    <td>${x.name}</td>
    <td>${x.percent}</td>
    <td>${x.grade}</td>
    <td>${x.gp}</td>
    <td>${x.status}</td>
    </tr>`;
});

html+="</table>";

let spi = total/credits;

document.getElementById("output").innerHTML =
html + `<div class="result">SPI: ${spi.toFixed(2)}</div>`;
}

</script>

</body>
</html>
